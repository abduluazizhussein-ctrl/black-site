<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
    <title>Aziz Coin - Protected Edition</title>  
    <script src="https://telegram.org/js/telegram-web-app.js"></script>  
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>  
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>  
    <style>  
        :root { --gold: #f59e0b; --bg-dark: #0f172a; --card-bg: #1e293b; --text-gray: #94a3b8; --danger: #ef4444; }  
        body { margin: 0; background-color: var(--bg-dark); color: white; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }  
          
        /* Header */  
        .dashboard-header { padding: 15px; background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); border-bottom: 2px solid #334155; text-align: center; }  
        .score-box { font-size: 2.8rem; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 10px; margin: 10px 0; }  
        .coin-icon-small { width: 35px; height: 35px; }  
  
        /* Content Areas */  
        .main-content { flex: 1; display: flex; flex-direction: column; align-items: center; padding-top: 20px; overflow-y: auto; padding-bottom: 80px; }  
        .section { display: none; width: 100%; flex-direction: column; align-items: center; }  
        .active-section { display: flex; }  
  
        /* Game Circle */  
        .circle-outer { width: 220px; height: 220px; background: rgba(245, 158, 11, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid rgba(245, 158, 11, 0.2); margin-bottom: 15px; position: relative; }  
        #dog-image { width: 190px; height: 190px; border-radius: 50%; cursor: pointer; border: 4px solid var(--gold); transition: transform 0.05s; }  
        #dog-image:active { transform: scale(0.92); }  
  
        /* UI Components */  
        .btn-action { background: var(--gold); border: none; padding: 14px; border-radius: 12px; font-weight: bold; color: black; cursor: pointer; margin-top: 10px; width: 85%; font-size: 1rem; }  
        .list-container { width: 90%; background: #1e293b; border-radius: 15px; padding: 15px; margin-top: 15px; box-sizing: border-box; }  
        .list-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #334155; }  
          
        /* Nav Menu */  
        .nav-menu { background: #1e293b; display: flex; justify-content: space-around; padding: 12px 0; position: fixed; bottom: 0; width: 100%; border-top: 1px solid #334155; }  
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-gray); cursor: pointer; font-size: 0.7rem; flex: 1; }  
        .nav-item.active { color: var(--gold); }  
  
        /* Security Alert */  
        #security-alert { display: none; background: var(--danger); color: white; padding: 10px; border-radius: 10px; width: 85%; margin-bottom: 15px; text-align: center; font-weight: bold; }  
    </style>  
</head>  
<body>  
  
    <div class="dashboard-header">  
        <div id="security-alert">⚠️ Security Warning: Links are Blocked!</div>  
        <div style="font-size: 0.9rem; color: var(--gold);" id="username-display">Loading...</div>  
        <div class="score-box">  
            <img src="https://cdn-icons-png.flaticon.com/512/2422/2422796.png" class="coin-icon-small">  
            <span id="score">0</span>  
        </div>  
        <div style="font-size: 0.8rem; color: var(--text-gray);">⚡ Energy: <span id="energy">1000</span>/1000</div>  
    </div>  
  
    <div class="main-content">  
        <div id="play" class="section active-section">  
            <div class="circle-outer" id="click-area">  
                <img id="dog-image" src="https://cdn-icons-png.flaticon.com/512/616/616408.png">  
            </div>  
            <button class="btn-action" onclick="claimDaily()">🎁 Daily Bonus (+500)</button>  
        </div>  
  
        <div id="exchange" class="section">  
            <h2>⭐ Exchange Coins</h2>  
            <div class="list-container" style="text-align:center;">  
                <p>100,000 AZIZ = 10 Stars</p>  
                <div style="font-size: 1.2rem; margin: 10px 0;">Current: <b id="exch-val">0</b></div>  
            </div>  
            <button class="btn-action" onclick="handleExchange()">Exchange 100k for 10 Stars</button>  
            <p id="ex-status" style="margin-top:10px; font-size:0.8rem; color:#10b981;"></p>  
        </div>  
  
        <div id="friends" class="section">  
            <h2>👥 Referral</h2>  
            <p style="color: var(--text-gray); text-align: center;">Get 1,000 AZIZ for every invite!</p>  
            <div class="list-container">  
                <div class="list-item">Total Invites: <span id="ref-count">0</span></div>  
            </div>  
            <button class="btn-action" onclick="shareInvite()">Share My Link</button>  
        </div>  
  
        <div id="top" class="section">  
            <h2>🏆 Leaderboard</h2>  
            <div class="list-container" id="leaderboard-list">Loading...</div>  
        </div>  
  
        <div id="admin" class="section">  
            <h2>⚙️ Owner Panel</h2>  
            <button class="btn-action" onclick="giftAll(1000)">Give 1,000 to All</button>  
            <button class="btn-action" style="background:var(--danger); color:white;" onclick="resetStats()">Reset All Scores</button>  
        </div>  
    </div>  
  
    <div class="nav-menu">  
        <div class="nav-item active" onclick="showSec('play', this)"><span>🎮</span><span>Play</span></div>  
        <div class="nav-item" onclick="showSec('exchange', this)"><span>⭐</span><span>Stars</span></div>  
        <div class="nav-item" onclick="showSec('friends', this)"><span>👥</span><span>Invite</span></div>  
        <div class="nav-item" onclick="showSec('top', this)"><span>📊</span><span>Top</span></div>  
        <div class="nav-item" id="admin-nav" style="display:none;" onclick="showSec('admin', this)"><span>⚙️</span><span>Owner</span></div>  
    </div>  
  
    <script>  
        const firebaseConfig = {  
            apiKey: "AIzaSyCPSJoIUF_xfrRqjiLQmEn_j2M",  
            authDomain: "rich-dog-game.firebaseapp.com",  
            projectId: "rich-dog-game",  
            storageBucket: "rich-dog-game.firebasestorage.app",  
            messagingSenderId: "899688128690",  
            appId: "1:899688128690:web:2ad8761e98d7ba226a9ab"  
        };  
        firebase.initializeApp(firebaseConfig);  
        const db = firebase.firestore();  
        const tg = window.Telegram.WebApp;  
        tg.expand();  
  
        let score = 0, energy = 1000;  
        const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id.toString() : "dev_user";  
        const userName = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.first_name : "User";  
        const OWNER_ID = "8105159131";   
  
        // Security Check: Block Phishing Links in Input  
        function isSafe(text) {  
            const linkRegex = /(https?:\/\/[^\s]+)|(\.cc)|(\.ru)|(\.tk)|(bit\.ly)/gi;  
            return !linkRegex.test(text);  
        }  
  
        if (userId === OWNER_ID) document.getElementById('admin-nav').style.display = 'flex';  
  
        async function init() {  
            if(!isSafe(userName)) {  
                document.getElementById('security-alert').style.display = 'block';  
                return;  
            }  
            document.getElementById('username-display').innerText = "Player: " + userName;  
              
            const doc = await db.collection("users").doc(userId).get();  
            if (!doc.exists) {  
                let ref = new URLSearchParams(window.location.search).get('start');  
                await db.collection("users").doc(userId).set({ name: userName, score: 0, energy: 1000, referralCount: 0 });  
                if (ref && ref !== userId) {  
                    await db.collection("users").doc(ref).update({  
                        score: firebase.firestore.FieldValue.increment(1000),  
                        referralCount: firebase.firestore.FieldValue.increment(1)  
                    });  
                }  
            } else {  
                score = doc.data().score || 0;  
                energy = doc.data().energy || 1000;  
                document.getElementById('ref-count').innerText = doc.data().referralCount || 0;  
            }  
            updateUI();  
        }  
  
        document.getElementById('click-area').onclick = () => {  
            if (energy > 0) {  
                score++; energy--;  
                updateUI();  
                db.collection("users").doc(userId).update({ score: score, energy: energy });  
                tg.HapticFeedback.impactOccurred('light');  
            }  
        };  
  
        function updateUI() {  
            document.getElementById('score').innerText = score.toLocaleString();  
            document.getElementById('energy').innerText = energy;  
            document.getElementById('exch-val').innerText = score.toLocaleString();  
        }  
  
        function showSec(id, el) {  
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));  
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));  
            document.getElementById(id).classList.add('active-section');  
            el.classList.add('active');  
            if (id === 'top') loadTop();  
        }  
  
        async function loadTop() {  
            const snap = await db.collection("users").orderBy("score", "desc").limit(10).get();  
            let h = ""; let i = 1;  
            snap.forEach(d => h += `<div class="list-item"><span>${i++}. ${d.data().name}</span><b>${d.data().score.toLocaleString()}</b></div>`);  
            document.getElementById('leaderboard-list').innerHTML = h;  
        }  
  
        async function handleExchange() {  
            if (score >= 100000) {  
                score -= 100000;  
                await db.collection("exchanges").add({ userId, userName, date: new Date(), status: "Pending" });  
                await db.collection("users").doc(userId).update({ score: score });  
                document.getElementById('ex-status').innerText = "Request Sent! Admin will send 10 Stars.";  
                updateUI();  
            } else alert("You need 100,000 coins!");  
        }  
  
        function shareInvite() {  
            const link = `https://t.me/Aziz_afarbot?start=${userId}`;  
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=Join Aziz Coin!`);  
        }  
  
        setInterval(() => { if (energy < 1000) { energy++; updateUI(); } }, 3000);  
        init();  
    </script>  
</body>  
          </html>
