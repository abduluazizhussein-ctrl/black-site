<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
    <title>Rich Dog Clicker</title>  
    <script src="https://telegram.org/js/telegram-web-app.js"></script>  
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>  
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>  
    <style>  
        body {  
            margin: 0;  
            padding: 0;  
            background-color: #0f172a;  
            color: white;  
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;  
            display: flex;  
            flex-direction: column;  
            align-items: center;  
            justify-content: center;  
            height: 100vh;  
            overflow: hidden;  
            user-select: none;  
        }  
        #score-container {  
            font-size: 3.5rem;  
            font-weight: bold;  
            margin-bottom: 20px;  
            color: #fbbf24;  
            text-shadow: 0 0 15px rgba(251, 191, 36, 0.6);  
        }  
        #dog-container {  
            position: relative;  
            cursor: pointer;  
            transition: transform 0.1s;  
        }  
        #dog-container:active {  
            transform: scale(0.92);  
        }  
        #dog-image {  
            width: 280px;  
            height: 280px;  
            border-radius: 50%;  
            border: 8px solid #334155;  
            box-shadow: 0 0 40px rgba(0,0,0,0.6);  
            object-fit: cover;  
        }  
        .click-animation {  
            position: absolute;  
            color: #fbbf24;  
            font-weight: bold;  
            font-size: 2rem;  
            animation: floatUp 0.6s ease-out forwards;  
            pointer-events: none;  
        }  
        @keyframes floatUp {  
            0% { opacity: 1; transform: translateY(0); }  
            100% { opacity: 0; transform: translateY(-120px); }  
        }  
        #status {  
            margin-top: 25px;  
            font-size: 0.9rem;  
            color: #94a3b8;  
            background: rgba(255,255,255,0.05);  
            padding: 5px 15px;  
            border-radius: 20px;  
        }  
    </style>  
</head>  
<body>  
  
    <div id="score-container">0</div>  
      
    <div id="dog-container">  
        <img id="dog-image" src="https://placedog.net/500" alt="Click Me">  
    </div>  
  
    <div id="status">Connecting to Database...</div>  
  
    <script>  
        // የFirebase መረጃህ ከምስልህ ላይ የተወሰደ  
        const firebaseConfig = {  
            apiKey: "AIzaSyCPSJoIUF_xfrRqjiLQmEn_j2M",  
            authDomain: "rich-dog-game.firebaseapp.com",  
            projectId: "rich-dog-game",  
            storageBucket: "rich-dog-game.firebasestorage.app",  
            messagingSenderId: "899688128690",  
            appId: "1:899688128690:web:2ad8761e98d7ba226a9ab",  
            measurementId: "G-Z3MPB8SR6W"  
        };  
  
        // Initialize Firebase  
        firebase.initializeApp(firebaseConfig);  
        const db = firebase.firestore();  
  
        // Telegram WebApp Setup  
        const tg = window.Telegram.WebApp;  
        tg.expand();  
          
        // ዩዘር አይዲ ከቴሌግራም ማግኘት  
        const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id.toString() : "test_user";  
        const userName = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.first_name : "Player";  
  
        let score = 0;  
        const scoreElement = document.getElementById('score-container');  
        const dogContainer = document.getElementById('dog-container');  
        const statusElement = document.getElementById('status');  
  
        // ከFirebase ዳታ መጫን  
        const userRef = db.collection('users').doc(userId);  
        userRef.get().then((doc) => {  
            if (doc.exists) {  
                score = doc.data().score || 0;  
                scoreElement.innerText = score.toLocaleString();  
            }  
            statusElement.innerText = "Welcome, " + userName;  
        }).catch((error) => {  
            console.error("Error loading data:", error);  
            statusElement.innerText = "Error: Please check Firebase Rules";  
        });  
  
        // Click Event  
        dogContainer.addEventListener('pointerdown', (e) => {  
            score += 1;  
            scoreElement.innerText = score.toLocaleString();  
  
            // ዳታውን ወዲያው ሴቭ ማድረግ  
            userRef.set({   
                score: score,  
                lastUpdate: firebase.firestore.FieldValue.serverTimestamp(),  
                name: userName  
            }, { merge: true });  
  
            // ተንሳፋፊ ቁጥር አኒሜሽን  
            const rect = dogContainer.getBoundingClientRect();  
            const x = e.clientX - rect.left;  
            const y = e.clientY - rect.top;  
              
            const anim = document.createElement('div');  
            anim.className = 'click-animation';  
            anim.innerText = '+1';  
            anim.style.left = x + 'px';  
            anim.style.top = y + 'px';  
            dogContainer.appendChild(anim);  
              
            setTimeout(() => anim.remove(), 600);  
              
            // ለስልክ ንዘረት (Vibration)  
            if (tg.HapticFeedback) {  
                tg.HapticFeedback.impactOccurred('medium');  
            }  
        });  
    </script>  
</body>  
</html>
