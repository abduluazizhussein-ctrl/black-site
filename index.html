<!DOCTYPE html>        
<html lang="am">        
<head>        
    <meta charset="UTF-8">        
    <meta name="viewport" content="width=device-width, initial-scale=1.0">        
    <title>Black-Site Rich Dog Game</title>        
    <script src="https://telegram.org/js/telegram-web-app.js"></script>        
    <style>        
        body { background: radial-gradient(circle, #1a2a3a, #000); color: white; text-align: center; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; touch-action: none; }        
        #score-container { font-size: 3.5rem; color: #f1c40f; text-shadow: 0 0 15px #f39c12; font-weight: bold; }        
        .energy-bar-bg { width: 280px; height: 15px; background: #333; border-radius: 10px; margin: 10px auto; border: 1px solid #f1c40f; overflow: hidden; }        
        #energy-fill { width: 100%; height: 100%; background: linear-gradient(to right, #f1c40f, #e67e22); transition: width 0.3s ease; }        
        #dog-character { width: 260px; cursor: pointer; transition: transform 0.1s; filter: drop-shadow(0 0 20px rgba(241, 196, 15, 0.4)); user-select: none; -webkit-user-drag: none; }        
        #dog-character:active { transform: scale(0.92); }        
        .coin-animation { position: absolute; color: #f1c40f; font-size: 2.5rem; font-weight: bold; pointer-events: none; animation: floatUp 0.8s forwards; }        
        @keyframes floatUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-120px); } }        
    </style>        
</head>        
<body>        
    <div id="score-container">💰 <span id="balance">0</span></div>        
    <div style="margin: 10px 0;">⚡ <span id="energy-text">100</span>/100</div>    
    <div class="energy-bar-bg"><div id="energy-fill"></div></div>    
        
    <div>    
        <img id="dog-character" src="dog.png" alt="Rich Dog">    
    </div>    
    
    <script>        
        let tele = window.Telegram?.WebApp;    
        if (tele) { tele.expand(); tele.ready(); }    
            
        let balance = parseInt(localStorage.getItem('rich_balance')) || 0;        
        let energy = 100;        
            
        function updateUI() {     
            document.getElementById('balance').innerText = balance.toLocaleString();     
            document.getElementById('energy-text').innerText = energy;     
            document.getElementById('energy-fill').style.width = energy + "%";     
            localStorage.setItem('rich_balance', balance);     
        }        
        updateUI();        
    
        // በየ 3 ሰከንዱ ጉልበት እንዲሞላ (ይህ አልነበረም፣ ጨምሬልሃለሁ)  
        setInterval(() => { if(energy < 100) { energy++; updateUI(); } }, 3000);  
  
        const dog = document.getElementById('dog-character');    
        dog.addEventListener('click', (e) => {    
            if (energy > 0) {    
                balance += 1; energy -= 1; updateUI();    
                createCoin(e.clientX, e.clientY);    
                if (tele?.HapticFeedback) tele.HapticFeedback.impactOccurred('medium');    
            }    
        });    
    
        function createCoin(x, y) {    
            const coin = document.createElement('div');    
            coin.innerText = '+1'; coin.className = 'coin-animation';    
            coin.style.left = (x || window.innerWidth/2) + 'px';    
            coin.style.top = (y || window.innerHeight/2) + 'px';    
            document.body.appendChild(coin);    
            setTimeout(() => coin.remove(), 800);    
        }    
    </script>    
</body>    
      </html>
