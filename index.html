<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>የሃሳብ መፍለቂያ</title>
    <style>
        body { background-color: #1a1a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 40px; color: #fff; }
        
        .card { 
            background: #252525; 
            padding: 30px; 
            border-radius: 20px; 
            display: inline-block; 
            width: 320px; 
            border: 1px solid #f1c40f; /* የወርቅ ቀለም */
            box-shadow: 0 0 25px rgba(241, 196, 15, 0.2);
        }

        /* የሃሳብ ምልክቱ (መብራት) አኒሜሽን */
        .idea-icon {
            font-size: 60px;
            margin-bottom: 20px;
            display: block;
            animation: glow 2s infinite alternate; /* እየበራ የሚጠፋ አኒሜሽን */
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #f1c40f; transform: scale(1); }
            to { text-shadow: 0 0 30px #f39c12, 0 0 50px #f1c40f; transform: scale(1.1); }
        }

        h1 { color: #f1c40f; font-size: 22px; margin-top: 0; }
        p { color: #bdc3c7; font-size: 15px; line-height: 1.6; }
        
        .btn-idea {
            background: #f1c40f;
            color: #1a1a1a;
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="card">
        <span class="idea-icon">💡</span>

        <h1>የሃሳብ ማዕከል</h1>
        <p>እዚህ ጋር ከአእምሮ የሚመነጩ አዳዲስ የፈጠራ ስራዎችና ቴክኖሎጂዎች ይበቅላሉ።</p>

        <button class="btn-idea" onclick="alert('አዲስ ሃሳብ ተፈጠረ!')">አዲስ ሃሳብ አፍልቅ</button>
        
        <div style="margin-top: 25px; padding-top: 15px; border-top: 1px solid #444;">
            <p style="font-style: italic; font-size: 13px;">"እውቀት ከሃሳብ ይጀምራል"</p>
        </div>
    </div>

</body>
</html>
