<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
    <title>Aziz Coin - Ultimate Edition</title>  
    <script src="https://telegram.org/js/telegram-web-app.js"></script>  
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>  
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>  
    <style>  
        :root { --gold: #f59e0b; --bg-dark: #0f172a; --card-bg: #1e293b; --text-gray: #94a3b8; }  
        body { margin: 0; background-color: var(--bg-dark); color: white; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }  
          
        /* Header */  
        .dashboard-header { padding: 15px; background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); border-bottom: 2px solid #334155; text-align: center; }  
        .user-info { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 5px; }  
        .level-badge { background: var(--gold); color: black; padding: 2px 12px; border-radius: 20px; font-weight: bold; font-size: 0.8rem; }  
        .score-box { font-size: 3rem; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 10px; margin: 10px 0; }  
        .coin-icon-small { width: 35px; height: 35px; }  
        .progress-container { width: 85%; background: #334155; height: 10px; border-radius: 10px; margin: 5px auto; overflow: hidden; }  
        .progress-fill { width: 0%; height: 100%; background: var(--gold); transition: width 0.5s; }  
  
        /* Main Content */  
        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow-y: auto; }  
        .section { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; padding-top: 20px; }  
        .active-section { display: flex; }  
  
        /* Game Elements */  
        .circle-outer { width: 260px; height: 260px; background: rgba(245, 158, 11, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid rgba(245, 158, 11, 0.2); position: relative; }  
        #dog-image { width: 220px; height: 220px; border-radius: 50%; cursor: pointer; transition: transform 0.05s; border: 4px solid var(--gold); box-shadow: 0 0 30px rgba(245, 158, 11, 0.3); }  
        #dog-image:active { transform: scale(0.92); }  
  
        /* Navigation */  
        .nav-menu { background: #1e293b; display: flex; justify-content: space-around; padding: 12px 0; border-radius: 20px 20px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); }  
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-gray); cursor: pointer; font-size: 0.75rem; flex: 1; transition: 0.2s; }  
        .nav-item.active { color: var(--gold); transform: translateY(-3px); }  
  
        /* UI Components */  
        .btn-action { background: var(--gold); border: none; padding: 12px 30px; border-radius: 12px; font-weight: bold; color: black; cursor: pointer; margin-top: 15px; width: 80%; }  
        .list-container { width: 90%; background: #1e293b; border-radius: 15px; padding: 10px; margin-top: 10px; }  
        .list-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #334155; }  
        .floating-text { position: absolute; color: white; font-weight: bold; font-size: 1.8rem; pointer-events: none; animation: floatUp 0.6s ease-out forwards; z-index: 100; }  
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-120px); } }  
    </style>  
</head>  
<body>  
  
    <div class="dashboard-header">  
        <div class="user-info">  
            <span id="username-display">Loading...</span>  
            <span class="level-badge" id="level-display">LVL 1</span>  
        </div>  
        <div class="progress-container"><div class="progress-fill" id="progress-bar"></div></div>  
        <div class="score-box">  
            <img src="https://cdn-icons-png.flaticon.com/512/2422/2422796.png" class="coin-icon-small">  
            <span id="score">0</span>  
        </div>  
    </div>  
  
    <div class="main-content">  
        <div id="play" class="section active-section">  
            <div class="circle-outer" id="click-area">  
                <img id="dog-image" src="https://cdn-icons-png.flaticon.com/512/616/616408.png">  
            </div>  
            <div style="margin-top: 15px; color: var(--text-gray);">⚡ <span id="energy">1000</span> / 1000</div>  
            <button class="btn-action" onclick="claimDaily()">🎁 Claim Daily Bonus (+500)</button>  
        </div>  
  
        <div id="leaderboard" class="section">  
            <h2>🏆 Top Players</h2>  
            <div class="list-container" id="leaderboard-list">Loading...</div>  
        </div>  
  
        <div id="admin" class="section">  
            <h2>⚙️ Admin Control</h2>  
            <p>Welcome, Owner. Manage your game here.</p>  
            <button class="btn-action" style="background:#ef4444; color:white;" onclick="resetAllEnergy()">Reset Everyone's Energy</button>  
            <button class="btn-action" onclick="addBonusToAll(1000)">Give 1000 Coins to All</button>  
        </div>  
    </div>  
  
    <div class="nav-menu">  
        <div class="nav-item active" onclick="showSec('play', this)"><span>🎮</span><span>Play</span></div>  
        <div class="nav-item" onclick="showSec('leaderboard', this)"><span>📊</span><span>Top</span></div>  
        <div class="nav-item" id="admin-nav" style="display:none;" onclick="showSec('admin', this)"><span>⚙️</span><span>Admin</span></div>  
    </div>  
  
    <script>  
        // Firebase Configuration (Using your credentials)  
        const firebaseConfig = {  
            apiKey: "AIzaSyCPSJoIUF_xfrRqjiLQmEn_j2M",  
            authDomain: "rich-dog-game.firebaseapp.com",  
            projectId: "rich-dog-game",  
            storageBucket: "rich-dog-game.firebasestorage.app",  
            messagingSenderId: "899688128690",  
            appId: "1:899688128690:web:2ad8761e98d7ba226a9ab"  
        };  
        firebase.initializeApp(firebaseConfig);  
        const db = firebase.firestore();  
        const tg = window.Telegram.WebApp;  
        tg.expand();  
  
        let score = 0, energy = 1000, lastClickTime = 0;  
        const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id.toString() : "dev_user";  
        const userName = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.first_name : "Player";  
  
        // Admin Security Check (Put your Telegram ID here)  
        const ADMIN_ID = "8105159131";   
        if (userId === ADMIN_ID) document.getElementById('admin-nav').style.display = 'flex';  
  
        document.getElementById('username-display').innerText = userName;  
  
        async function loadUser() {  
            const doc = await db.collection("users").doc(userId).get();  
            if (doc.exists) {  
                const data = doc.data();  
                score = data.score || 0;  
                energy = data.energy || 1000;  
                updateUI();  
            } else {  
                await db.collection("users").doc(userId).set({ name: userName, score: 0, energy: 1000, lastDaily: 0 });  
            }  
        }  
  
        document.getElementById('click-area').addEventListener('click', (e) => {  
            const now = Date.now();  
            if (now - lastClickTime < 50 || energy <= 0) return;  
            score++; energy--; lastClickTime = now;  
            updateUI(); spawnText(e); saveData();  
            tg.HapticFeedback.impactOccurred('light');  
        });  
  
        function spawnText(e) {  
            const div = document.createElement('div');  
            div.className = 'floating-text'; div.innerText = '+1';  
            div.style.left = e.clientX + 'px'; div.style.top = e.clientY + 'px';  
            document.body.appendChild(div); setTimeout(() => div.remove(), 600);  
        }  
  
        function updateUI() {  
            document.getElementById('score').innerText = score.toLocaleString();  
            document.getElementById('energy').innerText = energy;  
            let level = Math.floor(score / 2000) + 1;  
            document.getElementById('level-display').innerText = "LVL " + level;  
            document.getElementById('progress-bar').style.width = ((score % 2000) / 2000 * 100) + "%";  
        }  
  
        async function saveData() {  
            await db.collection("users").doc(userId).update({ score: score, energy: energy });  
        }  
  
        function showSec(id, el) {  
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));  
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));  
            document.getElementById(id).classList.add('active-section');  
            el.classList.add('active');  
            if(id === 'leaderboard') loadLeaderboard();  
        }  
  
        async function loadLeaderboard() {  
            const snap = await db.collection("users").orderBy("score", "desc").limit(10).get();  
            let html = ""; let i = 1;  
            snap.forEach(doc => {  
                html += `<div class="list-item"><span>${i++}. ${doc.data().name}</span><b>${doc.data().score.toLocaleString()}</b></div>`;  
            });  
            document.getElementById('leaderboard-list').innerHTML = html || "No players yet.";  
        }  
  
        async function claimDaily() {  
            const doc = await db.collection("users").doc(userId).get();  
            const now = Date.now();  
            if (now - (doc.data().lastDaily || 0) > 86400000) {  
                score += 500;  
                await db.collection("users").doc(userId).update({ score: score, lastDaily: now });  
                alert("Success! +500 Coins added."); updateUI();  
            } else alert("Come back tomorrow!");  
        }  
  
        // --- Admin Controls ---  
        async function resetAllEnergy() {  
            if (userId !== ADMIN_ID) return;  
            const batch = db.batch();  
            const users = await db.collection("users").get();  
            users.forEach(u => batch.update(u.ref, { energy: 1000 }));  
            await batch.commit(); alert("All users' energy reset to 1000!");  
        }  
  
        async function addBonusToAll(amount) {  
            if (userId !== ADMIN_ID) return;  
            const users = await db.collection("users").get();  
            users.forEach(async u => {  
                await db.collection("users").doc(u.id).update({ score: firebase.firestore.FieldValue.increment(amount) });  
            });  
            alert(`Bonus of ${amount} coins sent to everyone!`);  
        }  
  
        setInterval(() => { if(energy < 1000) { energy++; updateUI(); } }, 3000);  
        loadUser();  
    </script>  
</body>  
                                                                                                      </html>
