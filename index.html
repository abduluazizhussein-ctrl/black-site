<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rich Dog: Tap & Earn</title>
<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body { background: radial-gradient(circle, #1a2a3a, #000); color: white; text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; touch-action: none; }
#score-container { font-size: 3rem; color: #f1c40f; font-weight: bold; text-shadow: 0 0 15px rgba(243, 156, 18, 0.6); margin-top: 10px; }
.energy-container { width: 80%; max-width: 300px; margin: 15px 0; }
.energy-bar-bg { width: 100%; height: 12px; background: #333; border-radius: 10px; border: 1px solid #f1c40f; overflow: hidden; margin-top: 5px; }
#energy-fill { width: 100%; height: 100%; background: linear-gradient(to right, #f1c40f, #e67e22); transition: width 0.3s ease; }
#dog-character { width: 230px; height: 230px; cursor: pointer; transition: transform 0.1s; filter: drop-shadow(0 0 20px rgba(241, 196, 15, 0.4)); border-radius: 50%; object-fit: cover; border: 5px solid #f1c40f; margin: 10px 0; }
#dog-character:active { transform: scale(0.92); }
.btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 90%; max-width: 400px; margin-top: 15px; }
.game-btn { padding: 12px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 0.9rem; transition: 0.3s; color: white; }
.invite-btn { background: #0088cc; }
.spin-btn { background: #8e44ad; }
.task-btn { background: #27ae60; grid-column: span 2; }
#ton-connect-btn { margin: 15px 0; }
.leaderboard-box { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(241, 196, 15, 0.3); border-radius: 15px; width: 90%; max-width: 360px; margin-top: 20px; padding: 15px; }
.leader-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
.coin-animation { position: absolute; color: #f1c40f; font-size: 2rem; font-weight: bold; pointer-events: none; animation: floatUp 0.8s forwards; }
@keyframes floatUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-120px); } }
#wheel { width:200px; height:200px; margin:20px auto; background:url('https://raw.githubusercontent.com/abduluazizhussein-ctrl/black-site/main/wheel.png') no-repeat center/cover; border-radius:50%; transition: transform 3s ease-out; }
</style>
</head>
<body>
<div id="score-container">💰 <span id="balance">0</span></div>
<div class="energy-container">
⚡ ጉልበት: <span id="energy-text">100</span>/100
<div class="energy-bar-bg"><div id="energy-fill"></div></div>
</div>
<img id="dog-character" src="https://raw.githubusercontent.com/abduluazizhussein-ctrl/black-site/main/dog.png" alt="Rich Dog"
<div id="ton-connect-btn"></div>
<div id="wheel"></div>
<div class="btn-grid">
<button class="game-btn invite-btn" onclick="inviteFriends()">👥 ጓደኞችን ጋብዝ</button>
<button class="game-btn spin-btn" onclick="spinWheel()">🎡 ዕድልዎን ይሞክሩ</button>
<button class="game-btn task-btn" onclick="completeTask()">📢 Join Airdrop Task (+5,000 ሳንቲም)</button>
</div>
<div class="leaderboard-box">      
<div style="color: #f1c40f; margin-bottom: 10px; font-weight: bold;">🏆 የደረጃ ሰንጠረዥ (Leaderboard)</div>      
<div class="leader-item"><span>1. King Sep</span><span>294,912 💰</span></div>      
<div class="leader-item"><span>2. አብዱላዚዝ (አንተ)</span><span id="user-rank-score">0 💰</span></div>      
<div class="leader-item"><span>3. Thomas RICH</span><span>5,400 💰</span></div>      
</div>
<script>
let tele = window.Telegram?.WebApp; if(tele){ tele.expand(); tele.ready(); }
let balance = parseInt(localStorage.getItem('rich_balance')) || 0;
let energy = parseInt(localStorage.getItem('rich_energy')) || 100;
const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({ manifestUrl:'https://abduluazizhussein-ctrl.github.io/black-site/tonconnect-manifest.json', buttonRootId:'ton-connect-btn' });

function updateUI() {
document.getElementById('balance').innerText = balance.toLocaleString();
document.getElementById('user-rank-score').innerText = balance.toLocaleString() + " 💰";
document.getElementById('energy-text').innerText = energy;
document.getElementById('energy-fill').style.width = energy + "%";
localStorage.setItem('rich_balance', balance);
localStorage.setItem('rich_energy', energy);
}

// Tap
function handleTap(e){
if(energy>0){ balance+=1; energy-=1; updateUI(); createCoinAnimation(e.clientX,e.clientY); if(tele?.HapticFeedback) tele.HapticFeedback.impactOccurred('medium'); }
}

// Spin Wheel Animation
function spinWheel(){
const prizes=[0,50,100,500,1000,5000];
const win=prizes[Math.floor(Math.random()*prizes.length)];
let spins = 360*5 + Math.random()*360;
const wheel = document.getElementById("wheel");
wheel.style.transition = "transform 3s ease-out";
wheel.style.transform = `rotate(${spins}deg)`;
setTimeout(()=>{ balance+=win; updateUI(); alert(win>0?`🎉 ${win} ሳንቲም አሸነፉ!`:"😅 እንደገና ይሞክሩ!"); wheel.style.transition="none"; wheel.style.transform="rotate(0deg)"; },3000);
}

// Airdrop Task with Limit
function completeTask(){
if(localStorage.getItem("task_done")){ alert("Task already completed!"); return; }
window.open("https://t.me/YourChannelLink","_blank");
balance+=5000; localStorage.setItem("task_done","yes"); updateUI();
alert("✅ 5000 ሳንቲም ተጨምሮልዎታል!");
}

// Invite
function inviteFriends(){
const userId = localStorage.getItem("user_id") || Math.floor(Math.random()*1e6);
localStorage.setItem("user_id",userId);
const link = `https://t.me/Aziz_afarbot/richdog?ref=${userId}`;
tele.openTelegramLink(link);
}

// Coin Animation
function createCoinAnimation(x,y){
const coin=document.createElement('div'); coin.innerText='+1'; coin.className='coin-animation'; coin.style.left=(x||window.innerWidth/2)+'px'; coin.style.top=(y||window.innerHeight/2)+'px';
document.body.appendChild(coin); setTimeout(()=>coin.remove(),800);
}

// Energy Recovery
setInterval(()=>{ if(energy<100){ energy++; updateUI(); } },3000);

updateUI();
</script>
</body>
</html>
