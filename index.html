<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
    <title>$AZIZ Super App</title>  
    <script src="https://telegram.org/js/telegram-web-app.js"></script>  
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>  
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>  
    <style>  
        :root { --gold: #fbbf24; --bg: #020617; }  
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }  
          
        /* Header Stats */  
        .header { width: 90%; display: flex; justify-content: space-between; padding: 20px; font-weight: bold; }  
        #score-container { font-size: 3rem; color: var(--gold); margin: 10px 0; }  
          
        /* Energy Bar */  
        .energy-container { width: 80%; height: 12px; background: #1e293b; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }  
        #energy-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #facc15, #eab308); transition: width 0.3s; }  
  
        /* Main Game Area */  
        #game-area { display: flex; flex-direction: column; align-items: center; width: 100%; }  
        #dog-image { width: 250px; height: 250px; border-radius: 50%; border: 5px solid var(--gold); cursor: pointer; transition: transform 0.05s; }  
        #dog-image:active { transform: scale(0.9); }  
  
        /* Tabs/Navigation */  
        .nav { position: fixed; bottom: 0; width: 100%; background: #0f172a; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #334155; }  
        .nav button { background: none; border: none; color: #94a3b8; font-weight: bold; cursor: pointer; }  
        .nav button.active { color: var(--gold); }  
  
        /* Sections */  
        .section { display: none; width: 90%; padding-top: 20px; text-align: center; }  
        .active-section { display: block; }  
  
        /* Spin Wheel */  
        #wheel { width: 200px; height: 200px; border: 5px solid var(--gold); border-radius: 50%; margin: 20px auto; display: flex; align-items: center; justify-content: center; transition: transform 3s cubic-bezier(0.1, 0, 0.1, 1); }  
          
        /* Lists */  
        .list-item { background: #1e293b; margin: 10px 0; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; }  
        button.action-btn { background: var(--gold); border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; margin-top: 10px; }  
    </style>  
</head>  
<body>  
  
    <div class="header">  
        <div id="level-name">Level 1</div>  
        <div>⚡ <span id="energy-text">1000</span>/1000</div>  
    </div>  
  
    <div id="score-container">0</div>  
  
    <div class="energy-container">  
        <div id="energy-bar"></div>  
    </div>  
  
    <div id="home" class="section active-section">  
        <div id="game-area">  
            <img id="dog-image" src="https://cdn-icons-png.flaticon.com/512/616/616408.png" alt="Dog">  
        </div>  
    </div>  
  
    <div id="spin" class="section">  
        <h2>Lucky Spin</h2>  
        <div id="wheel">🎡</div>  
        <button class="action-btn" onclick="spinWheel()">Spin for 100 Coins</button>  
    </div>  
  
    <div id="friends" class="section">  
        <h2>Invite Friends</h2>  
        <p>Get 5,000 for each friend!</p>  
        <button class="action-btn" onclick="inviteFriend()">Copy Invite Link</button>  
        <div id="referral-list" style="margin-top: 20px;"></div>  
    </div>  
  
    <div id="leaderboard" class="section">  
        <h2>Top Players</h2>  
        <div id="leader-list"></div>  
    </div>  
  
    <div id="wallet" class="section">  
        <h2>Withdraw TON</h2>  
        <div class="list-item">  
            <input type="text" id="wallet-addr" placeholder="Enter TON Address" style="width: 70%; padding: 5px;">  
            <button onclick="saveWallet()">Save</button>  
        </div>  
        <button class="action-btn" onclick="withdraw()">Withdraw $AZIZ</button>  
    </div>  
  
    <div class="nav">  
        <button onclick="showSection('home')" id="nav-home" class="active">🎮 Click</button>  
        <button onclick="showSection('spin')">🎡 Spin</button>  
        <button onclick="showSection('friends')">👥 Friends</button>  
        <button onclick="showSection('leaderboard')">🏆 Top</button>  
        <button onclick="showSection('wallet')">💰 Wallet</button>  
    </div>  
  
    <script>  
        // --- Firebase Config ---  
        const firebaseConfig = {  
            apiKey: "AIzaSyCPSJoIUF_xfrRqjiLQmEn_j2M",  
            authDomain: "rich-dog-game.firebaseapp.com",  
            projectId: "rich-dog-game",  
            storageBucket: "rich-dog-game.firebasestorage.app",  
            messagingSenderId: "899688128690",  
            appId: "1:899688128690:web:2ad8761e98d7ba226a9ab"  
        };  
        firebase.initializeApp(firebaseConfig);  
        const db = firebase.firestore();  
        const tg = window.Telegram.WebApp;  
        tg.expand();  
  
        let score = 0;  
        let energy = 1000;  
        let lastClickTime = 0;  
        const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id.toString() : "dev_user";  
        const userName = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.first_name : "Aziz Player";  
  
        // --- Core Functions ---  
        function showSection(id) {  
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));  
            document.getElementById(id).classList.add('active-section');  
            if(id === 'leaderboard') loadLeaderboard();  
        }  
  
        // --- Anti-Cheat & Click ---  
        document.getElementById('dog-image').addEventListener('click', (e) => {  
            const now = Date.now();  
            if (now - lastClickTime < 50) return; // Anti-cheat: Too fast  
            if (energy <= 0) {  
                tg.showAlert("No Energy left!");  
                return;  
            }  
  
            lastClickTime = now;  
            score += 1;  
            energy -= 1;  
            updateUI();  
            saveData();  
              
            // Haptic  
            tg.HapticFeedback.impactOccurred('light');  
        });  
  
        // --- Energy Recovery ---  
        setInterval(() => {  
            if (energy < 1000) {  
                energy += 2;  
                updateUI();  
            }  
        }, 1000);  
  
        function updateUI() {  
            document.getElementById('score-container').innerText = score.toLocaleString();  
            document.getElementById('energy-text').innerText = energy;  
            document.getElementById('energy-bar').style.width = (energy / 10) + "%";  
        }  
  
        // --- Firebase Sync ---  
        function saveData() {  
            db.collection('users').doc(userId).set({  
                score: score,  
                name: userName,  
                lastSeen: firebase.firestore.FieldValue.serverTimestamp()  
            }, { merge: true });  
        }  
  
        async function loadLeaderboard() {  
            const snapshot = await db.collection('users').orderBy('score', 'desc').limit(5).get();  
            let html = "";  
            snapshot.forEach(doc => {  
                html += `<div class="list-item"><span>${doc.data().name}</span> <span>${doc.data().score.toLocaleString()}</span></div>`;  
            });  
            document.getElementById('leader-list').innerHTML = html;  
        }  
  
        // --- Features ---  
        function spinWheel() {  
            if (score < 100) return;  
            score -= 100;  
            const deg = Math.floor(Math.random() * 360) + 1080;  
            document.getElementById('wheel').style.transform = `rotate(${deg}deg)`;  
            setTimeout(() => {  
                const win = Math.floor(Math.random() * 1000);  
                score += win;  
                tg.showAlert("You won " + win + " coins!");  
                updateUI();  
                saveData();  
            }, 3000);  
        }  
  
        function inviteFriend() {  
            const link = `https://t.me/Aziz_afarbot?start=${userId}`;  
            const text = `Join my $AZIZ coin team and earn together!`;  
            window.open(`https://t.me/share/url?url=${link}&text=${text}`);  
        }  
  
        function saveWallet() {  
            const addr = document.getElementById('wallet-addr').value;  
            db.collection('users').doc(userId).update({ wallet: addr });  
            tg.showAlert("Wallet Saved!");  
        }  
  
        function withdraw() {  
            if (score < 100000) {  
                tg.showAlert("Minimum withdraw is 100,000 $AZIZ");  
            } else {  
                tg.showAlert("Request Sent! Pending review.");  
            }  
        }  
  
        // Load Initial Data  
        db.collection('users').doc(userId).get().then(doc => {  
            if(doc.exists) {  
                score = doc.data().score || 0;  
                updateUI();  
            }  
        });  
  
    </script>  
</body>  
</html>
