<!DOCTYPE html>    
<html lang="am">    
<head>    
    <meta name="google-site-verification" content="sZZLXX6TxICEOKuWXcsf_nre2TQuvSIWxSaJqIzqBCI" />    
        
    <meta charset="UTF-8">    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">    
    <title>Black-Site Rich Dog Game</title>    
        
    <style>    
        body {     
            background: radial-gradient(circle, #2c3e50, #000);     
            color: white;     
            text-align: center;     
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;     
            overflow: hidden;     
            height: 100vh;     
            display: flex;     
            flex-direction: column;     
            justify-content: center;     
            margin: 0;    
        }    
    
        #score-container {     
            font-size: 3.5rem;     
            margin-bottom: 10px;     
            color: #f1c40f;     
            text-shadow: 0 0 15px #f39c12;     
            font-weight: bold;    
        }    
    
        #energy-container {    
            margin-bottom: 20px;    
            font-size: 1.2rem;    
        }    
    
        .energy-bar-bg {    
            width: 250px;    
            height: 20px;    
            background: #444;    
            border-radius: 10px;    
            margin: 10px auto;    
            border: 2px solid #f1c40f;    
        }    
    
        #energy-fill {    
            width: 100%;    
            height: 100%;    
            background: linear-gradient(to right, #f1c40f, #e67e22);    
            border-radius: 8px;    
            transition: width 0.2s;    
        }    
    
        #dog-character {     
            width: 220px;     
            cursor: pointer;     
            transition: transform 0.1s;     
            user-select: none;    
            -webkit-user-drag: none;    
        }    
    
        #dog-character:active {     
            transform: scale(0.92);     
        }    
    
        .coin-animation {     
            position: absolute;     
            color: #f1c40f;     
            font-size: 1.5rem;    
            font-weight: bold;     
            pointer-events: none;    
            animation: floatUp 0.8s forwards;     
        }    
    
        @keyframes floatUp {     
            from { opacity: 1; transform: translateY(0); }     
            to { opacity: 0; transform: translateY(-120px); }     
        }    
    
        .status-msg {    
            color: #e74c3c;    
            font-weight: bold;    
            height: 20px;    
            margin-top: 10px;    
        }    
    </style>    
</head>    
<body>    
    
    <div id="score-container">💰 <span id="balance">0</span></div>    
        
    <div id="energy-container">    
        ⚡ ጉልበት: <span id="energy-text">100</span>/100    
        <div class="energy-bar-bg">    
            <div id="energy-fill"></div>    
        </div>    
    </div>    
          
    <div>    
        <img id="dog-character" src="https://cdn-icons-png.flaticon.com/512/616/616408.png" alt="Rich Dog">    
    </div>    
    
    <div id="msg" class="status-msg"></div>    
    
    <script>    
        // ዳታዎችን ከስልኩ ሜሞሪ መጫን    
        let balance = parseInt(localStorage.getItem('rich_balance')) || 0;    
        let energy = parseInt(localStorage.getItem('rich_energy')) || 100;    
    
        const balanceDisplay = document.getElementById('balance');    
        const energyDisplay = document.getElementById('energy-text');    
        const energyFill = document.getElementById('energy-fill');    
        const dog = document.getElementById('dog-character');    
        const msg = document.getElementById('msg');    
    
        // መጀመሪያ ላይ ያሉትን ነጥቦች ማሳየት    
        balanceDisplay.innerText = balance;    
        updateEnergyUI();    
    
        // በየ 3 ሰከንዱ ጉልበት እንዲሞላ (Auto-regen)    
        setInterval(() => {    
            if (energy < 100) {    
                energy++;    
                updateEnergyUI();    
                saveData();    
            }    
        }, 3000);    
    
        // ውሻው ሲነካ የሚሰራው ስራ    
        dog.addEventListener('click', (e) => {    
            if (energy > 0) {    
                balance++;    
                energy--;    
                    
                balanceDisplay.innerText = balance;    
                updateEnergyUI();    
                saveData();    
                createCoin(e.clientX, e.clientY);    
                msg.innerText = ""; // መልዕክቱን ማጥፋት    
            } else {    
                msg.innerText = "ጉልበት አልቆብሃል! ትንሽ ጠብቅ...";    
            }    
        });    
    
        function updateEnergyUI() {    
            energyDisplay.innerText = energy;    
            energyFill.style.width = energy + "%";    
        }    
    
        function saveData() {    
            localStorage.setItem('rich_balance', balance);    
            localStorage.setItem('rich_energy', energy);    
        }    
    
        function createCoin(x, y) {    
            const coin = document.createElement('div');    
            coin.innerText = '+1';    
            coin.className = 'coin-animation';    
            coin.style.left = x + 'px';    
            coin.style.top = y + 'px';    
            document.body.appendChild(coin);    
            setTimeout(() => coin.remove(), 800);    
        }    
    
        // ለስልክ ንክኪ (Touch) እንዲመች    
        dog.addEventListener('touchstart', (e) => {    
            e.preventDefault(); // ገጹ እንዳይንቀሳቀስ    
            dog.click();    
        });    
    </script>    
</body>    
</html>
