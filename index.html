<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rich Dog V2</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
margin:0;
background:#0b0c12;
color:white;
font-family:Arial;
text-align:center;
}

.top{
display:flex;
justify-content:space-between;
padding:15px;
}

.deposit{
background:#27ae60;
border:none;
color:white;
padding:10px 15px;
border-radius:10px;
}

.balance{
font-size:40px;
color:#f1c40f;
margin-top:10px;
}

.dog{
width:220px;
border-radius:50%;
margin-top:20px;
}

.energy{
width:200px;
height:10px;
background:#333;
margin:auto;
border-radius:10px;
overflow:hidden;
}

.energy-bar{
height:100%;
width:100%;
background:#27ae60;
}

.spin-btn{
margin-top:20px;
padding:12px 20px;
background:#f1c40f;
border:none;
border-radius:10px;
font-weight:bold;
}

.bottom{
position:fixed;
bottom:0;
width:100%;
background:#1a1c24;
display:flex;
justify-content:space-around;
padding:12px 0;
}

.bottom button{
background:none;
border:none;
color:white;
font-size:14px;
}

.hidden{
display:none;
}

.page{
padding-bottom:80px;
}

input{
width:80%;
padding:10px;
border-radius:10px;
border:none;
margin-top:10px;
}

.withdraw{
margin-top:10px;
padding:10px 20px;
background:#f1c40f;
border:none;
border-radius:10px;
}

</style>
</head>

<body>

<div class="top">
<button onclick="alert('Settings Soon')">⚙</button>
<button class="deposit" onclick="deposit()">Deposit</button>
</div>

<div id="home" class="page">

<div class="balance">
💰 <span id="coins">500</span>
</div>

<img class="dog" id="dog" src="https://raw.githubusercontent.com/abduluazizhussein-ctrl/black-site/main/dog.png">

<div class="energy">
<div class="energy-bar" id="energyBar"></div>
</div>

<button class="spin-btn" onclick="spin()">🎡 Spin</button>

</div>

<div id="friends" class="page hidden">

<h2>Invite Friends</h2>

<p>Earn 200 coins per friend</p>

<button onclick="invite()">Invite</button>

</div>

<div id="tasks" class="page hidden">

<h2>Tasks</h2>

<button onclick="window.open('https://t.me/AzizAfarBot')">
Join Telegram
</button>

</div>

<div id="withdraw" class="page hidden">

<h2>Withdraw TON</h2>

<p>Minimum 10000 coins</p>

<input id="wallet" placeholder="TON wallet address">

<br>

<button class="withdraw" onclick="withdraw()">Submit</button>

</div>

<div class="bottom">

<button onclick="tab('home')">🏠 Home</button>
<button onclick="tab('friends')">👥 Friends</button>
<button onclick="tab('tasks')">📋 Tasks</button>
<button onclick="tab('withdraw')">💸 Withdraw</button>

</div>

<script>

let tele = window.Telegram?.WebApp
if(tele){tele.expand()}

let coins = localStorage.getItem("coins")
? parseInt(localStorage.getItem("coins"))
: 500

let energy = 100

update()

document.getElementById("dog").onclick = function(){

if(energy<=0) return

coins+=1
energy-=1

update()

}

function update(){

document.getElementById("coins").innerText=coins

localStorage.setItem("coins",coins)

document.getElementById("energyBar").style.width=energy+"%"

}

setInterval(()=>{

if(energy<100){

energy+=2

update()

}

},1000)

function spin(){

let reward=Math.floor(Math.random()*500)

coins+=reward

alert("You won "+reward+" coins!")

update()

}

function invite(){

let link="https://t.me/share/url?url=https://t.me/Aziz_afarbot/richdog"

tele.openTelegramLink(link)

coins+=200

update()

}

function withdraw(){

let wallet=document.getElementById("wallet").value

if(coins<10000){

alert("Minimum 10000 coins")

return

}

alert("Withdraw request sent")

coins=0

update()

}

function deposit(){

alert("Send TON to your wallet address")

}

function tab(id){

document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"))

document.getElementById(id).classList.remove("hidden")

}

</script>

</body>
</html>
