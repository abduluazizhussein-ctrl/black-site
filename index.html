<!DOCTYPE html>

<body class="flex flex-col h-screen overflow-hidden">

    </div>

    <div class="p-4 flex justify-between items-center bg-slate-800/50 backdrop-blur-md border-b border-slate-700">
        <div class="flex items-center gap-2">

    <main id="game-tab" class="flex-1 flex flex-col items-center justify-center p-6 space-y-6">

                0 <span class="text-yellow-500 text-3xl">🦴</span>

            <p class="text-slate-400 mt-1 text-xs uppercase tracking-widest font-semibold">Auto-Mining: +10/min</p>

        <div class="w-full max-w-xs">

            </div>

        <button id="tap-btn" class="dog-btn w-64 h-64 bg-slate-800 rounded-full border-[10px] border-slate-700 shadow-[0_0_60px_rgba(0,0,0,0.6)] flex items-center justify-center text-8xl transition-all active:border-yellow-600 outline-none">
            🐕

    <div id="leaderboard-tab" class="hidden flex-1 p-6 overflow-y-auto">

            </div>

    <nav class="bg-slate-900 border-t border-slate-800 p-3 flex justify-around items-center">

        <button onclick="loadLeaderboard()" class="flex flex-col items-center gap-1 text-slate-500 hover:text-yellow-400 transition-colors">

        </button>
        <button onclick="inviteFriend()" class="flex flex-col items-center gap-1 text-slate-500 hover:text-yellow-400 transition-colors">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

        // Your Firebase Configuration

            projectId: "rich-dog-game",
            storageBucket: "rich-dog-game.firebasestorage.app",
            messagingSenderId: "899688128690",
            appId: "1:899688128690:web:2ad8761e986d7ba226a9ab"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const tg = window.Telegram.WebApp;
        tg.expand();

        let state = { coins: 0, energy: 100, lastUpdated: Date.now() };
        const userId = tg.initDataUnsafe?.user?.id?.toString() || "guest_" + Math.floor(Math.random() * 1000);
        const userName = tg.initDataUnsafe?.user?.first_name || "Guest";

        const LEVELS = [
            { name: "Puppy", threshold: 0 },
            { name: "Good Boy", threshold: 1000 },
            { name: "Rich Dog", threshold: 5000 },
            { name: "Alpha Leader", threshold: 25000 },
            { name: "Legendary Dog", threshold: 100000 }
        ];

        // 1. Initial Load
        async function loadGame() {
            try {
                const docSnap = await getDoc(doc(db, "users", userId));
                if (docSnap.exists()) {
                    state = docSnap.data();
                } else {
                    await saveToCloud(); // First time user
                }
                document.getElementById('user-name').innerText = userName;
                document.getElementById('loading').classList.add('hidden');
                updateUI();
            } catch (e) {
                console.error("Error loading:", e);
                document.getElementById('loading').innerText = "Database Error! Check Firebase Rules.";
            }
        }

        // 2. UI Updates
        window.updateUI = function() {
            document.getElementById('coin-balance').innerHTML = `${Math.floor(state.coins)} <span class="text-yellow-500 text-3xl">🦴</span>`;
            document.getElementById('energy-count').innerText = state.energy;
            
            let lvlIdx = 0;
            for(let i = LEVELS.length-1; i >=0; i--) {
                if(state.coins >= LEVELS[i].threshold) { lvlIdx = i; break; }
            }

            const current = LEVELS[lvlIdx];
            const next = LEVELS[lvlIdx + 1];
            
            document.getElementById('current-level-name').innerText = current.name;
            document.getElementById('rank-display').innerText = current.name + " Rank";

            if(next) {
                let range = next.threshold - current.threshold;
                let progress = ((state.coins - current.threshold) / range) * 100;
                document.getElementById('progress-bar').style.width = `${progress}%`;
                document.getElementById('next-level-percent').innerText = `${Math.floor(progress)}%`;
            } else {
                document.getElementById('progress-bar').style.width = '100%';
                document.getElementById('next-level-percent').innerText = 'MAX';
            }
        }

        // 3. Cloud Saving
        async function saveToCloud() {
            await setDoc(doc(db, "users", userId), 
 }   }  
  
        // 4. Interaction (Tapping)  
        document.getElementById('tap-btn').addEventListener('click', (e) => {  
            if(state.energy > 0) {  
                state.coins += 1;  
                state.energy -= 1;  
                tg.HapticFeedback.impactOccurred('light');  
                showTapEffect(e.clientX, e.clientY);  
                updateUI();  
                saveToCloud(); // በየተነካ ቁጥር ዳታው Cloud ላይ ይቆጥባል  
            } else {  
                tg.HapticFeedback.notificationOccurred('error');  
            }  
        });  
  
        function showTapEffect(x, y) {  
            const div = document.createElement('div');  
            div.className = 'tap-effect';  
            div.style.left = x + 'px';   
            div.style.top = y + 'px';  
            div.innerText = '+1';  
            document.body.appendChild(div);  
            setTimeout(() => div.remove(), 800);  
        }  
  
        // 5. Background Loops (Mining & Energy Recovery)  
        setInterval(() => {  
            state.coins += (10/60); // በደቂቃ 10 ሳንቲም (Auto-mining)  
            if(state.energy < 100) state.energy += 1;  
            updateUI();  
        }, 1000);  
  
        // በየ 30 ሰከንዱ ዳታውን ለተጨማሪ ደህንነት Cloud ላይ ያስቀምጣል  
        setInterval(() => {  
            saveToCloud();  
        }, 30000);  
  
        // 6. Tabs & Leaderboard  
        window.loadLeaderboard = async function() {  
            openTab('leaderboard');  
            const list = document.getElementById('leader-list');  
            list.innerHTML = '<div class="text-center py-10 animate-pulse text-slate-500">Syncing Cloud...</div>';  
              
            try {  
                const q = query(collection(db, "users"), orderBy("coins", "desc"), limit(10));  
                const snap = await getDocs(q);  
                list.innerHTML = '';  
                let r = 1;  
                snap.forEach(d => {  
                    const data = d.data();  
                    const item = document.createElement('div');  
                    item.className = `flex justify-between items-center p-4 rounded-2xl ${d.id === userId ? 'bg-yellow-500/10 border border-yellow-500/50' : 'bg-slate-800/50 border border-slate-700'}`;  
                    item.innerHTML = `  
                        <div class="flex items-center gap-4">  
                            <span class="text-slate-500 font-bold w-4">${r++}.</span>  
                            <span class="font-semibold text-slate-200">${data.name || 'Anonymous'}</span>  
                        </div>  
                        <span class="font-black text-yellow-500">${Math.floor(data.coins)} 🦴</span>  
                    `;  
                    list.appendChild(item);  
                });  
            } catch (e) {  
                console.error(e);  
                list.innerHTML = `<div class="text-red-400 text-center text-xs">Error loading leaderboard. Check Firestore Rules!</div>`;  
            }  
        }  
  
        window.openTab = function(tabName) {  
            document.getElementById('game-tab').classList.add('hidden');  
            document.getElementById('leaderboard-tab').classList.add('hidden');  
            document.getElementById(`${tabName}-tab`).classList.remove('hidden');  
              
            // የNavigation ቀለሞች ቅያሬ  
            const btns = document.querySelectorAll('nav button');  
            btns.forEach(b => b.classList.replace('text-yellow-500', 'text-slate-500'));  
            // ተጫኝው በተጫነው ቁልፍ መሰረት ቀለሙን ቢጫ ያደርጋል  
            if (event) event.currentTarget.classList.replace('text-slate-500', 'text-yellow-500');  
        }  
  
        window.inviteFriend = function() {  
            // የቦትህን username እዚህ ጋር ተካው (ለምሳሌ: RichDog_bot)  
            const botUsername = "YOUR_BOT_USERNAME";   
            const link = `https://t.me/${botUsername}?start=${userId}`;  
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=Join me on Rich Dog! Earn 🦴 and climb the leaderboard!`);  
        }  
  
        loadGame();  
    </script>
