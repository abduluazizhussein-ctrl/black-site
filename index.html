<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">  
    <title>Professional Coin App</title>  
    <script src="https://telegram.org/js/telegram-web-app.js"></script>  
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>  
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>  
    <style>  
        :root { --gold: #f59e0b; --bg-dark: #0f172a; --card-bg: #1e293b; }  
        body { margin: 0; background-color: var(--bg-dark); color: white; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }  
          
        /* Dashboard Header */  
        .dashboard-header { padding: 20px; background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%); border-bottom: 2px solid #334155; text-align: center; }  
        .user-info { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; }  
        .level-badge { background: var(--gold); color: black; padding: 2px 10px; border-radius: 20px; font-weight: bold; font-size: 0.8rem; }  
          
        /* Score Display */  
        .score-box { font-size: 3.5rem; font-weight: 900; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; margin: 15px 0; }  
        .coin-icon-small { width: 40px; height: 40px; }  
  
        /* Progress Bar */  
        .progress-container { width: 80%; background: #334155; height: 8px; border-radius: 10px; margin: 10px auto; overflow: hidden; }  
        .progress-fill { width: 20%; height: 100%; background: var(--gold); transition: width 0.5s; }  
  
        /* Main Game Area */  
        .main-content { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }  
        .circle-outer { width: 280px; height: 280px; background: rgba(245, 158, 11, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid rgba(245, 158, 11, 0.2); }  
        #dog-image { width: 240px; height: 240px; border-radius: 50%; cursor: pointer; transition: transform 0.1s; border: 4px solid var(--gold); box-shadow: 0 0 30px rgba(245, 158, 11, 0.3); }  
        #dog-image:active { transform: scale(0.95); }  
  
        /* Navigation Menu */  
        .nav-menu { background: #1e293b; display: flex; justify-content: space-around; padding: 15px 0; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); }  
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 5px; color: #94a3b8; cursor: pointer; font-size: 0.8rem; flex: 1; transition: 0.3s; }  
        .nav-item.active { color: var(--gold); }  
        .nav-icon { font-size: 1.5rem; }  
  
        /* Floating Animation */  
        .floating-text { position: absolute; color: white; font-weight: bold; font-size: 1.8rem; pointer-events: none; animation: floatUp 0.8s ease-out forwards; }  
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-150px); } }  
  
        .energy-stats { margin-top: 10px; font-size: 0.9rem; color: #94a3b8; }  
        .section { display: none; padding: 20px; text-align: center; height: 100%; }  
        .active-section { display: block; }  
    </style>  
</head>  
<body>  
  
    <div class="dashboard-header">  
        <div class="user-info">  
            <span id="username-display">Loading...</span>  
            <span class="level-badge" id="level-display">LVL 1</span>  
        </div>  
        <div class="progress-container">  
            <div class="progress-fill" id="progress-bar"></div>  
        </div>  
        <div class="score-box">  
            <img src="https://cdn-icons-png.flaticon.com/512/2422/2422796.png" class="coin-icon-small">  
            <span id="score">0</span>  
        </div>  
    </div>  
  
    <div class="main-content">  
        <div id="play" class="section active-section">  
            <div class="circle-outer" id="click-area">  
                <img id="dog-image" src="https://cdn-icons-png.flaticon.com/512/616/616408.png">  
            </div>  
            <div class="energy-stats">⚡ <span id="energy">1000</span> / 1000</div>  
        </div>  
  
        <div id="spin" class="section">  
            <h2>Lucky Wheel</h2>  
            <div style="font-size: 5rem; margin: 30px;">🎡</div>  
            <button onclick="startSpin()" style="background:var(--gold); border:none; padding:15px 40px; border-radius:10px; font-weight:bold;">SPIN FOR 200</button>  
        </div>  
  
        <div id="friends" class="section">  
            <h2>Invite Friends</h2>  
            <p>Earn 1,000 Coins for each friend</p>  
            <button onclick="share()" style="background:var(--gold); border:none; padding:15px 40px; border-radius:10px; font-weight:bold;">INVITE FRIENDS</button>  
        </div>  
    </div>  
  
    <div class="nav-menu">  
        <div class="nav-item active" onclick="showSec('play', this)">  
            <span class="nav-icon">🎮</span>  
            <span>Play</span>  
        </div>  
        <div class="nav-item" onclick="showSec('spin', this)">  
            <span class="nav-icon">🎡</span>  
            <span>Spin</span>  
        </div>  
        <div class="nav-item" onclick="showSec('friends', this)">  
            <span class="nav-icon">👥</span>  
            <span>Friends</span>  
        </div>  
        <div class="nav-item" onclick="showSec('wallet', this)">  
            <span class="nav-icon">⭐</span>  
            <span>Stars</span>  
        </div>  
    </div>  
  
    <script>  
        // Firebase Config (Your data from Image 12)  
        const firebaseConfig = {  
            apiKey: "AIzaSyCPSJoIUF_xfrRqjiLQmEn_j2M",  
            authDomain: "rich-dog-game.firebaseapp.com",  
            projectId: "rich-dog-game",  
            storageBucket: "rich-dog-game.firebasestorage.app",  
            messagingSenderId: "899688128690",  
            appId: "1:899688128690:web:2ad8761e98d7ba226a9ab"  
        };  
        firebase.initializeApp(firebaseConfig);  
        const db = firebase.firestore();  
        const tg = window.Telegram.WebApp;  
        tg.expand();  
  
        let score = 0;  
        let energy = 1000;  
        let level = 1;  
        const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id.toString() : "dev_user";  
  
        function showSec(id, el) {  
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));  
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));  
            document.getElementById(id).classList.add('active-section');  
            el.classList.add('active');  
        }  
  
        document.getElementById('click-area').addEventListener('click', (e) => {  
            if(energy > 0) {  
                score += 1;  
                energy -= 1;  
                updateUI();  
                save();  
                spawnText(e);  
                tg.HapticFeedback.impactOccurred('medium');  
            }  
        });  
  
        function spawnText(e) {  
            const text = document.createElement('div');  
            text.className = 'floating-text';  
            text.innerText = '+1';  
            text.style.left = e.clientX + 'px';  
            text.style.top = e.clientY + 'px';  
            document.body.appendChild(text);  
            setTimeout(() => text.remove(), 800);  
        }  
  
        function updateUI() {  
            document.getElementById('score').innerText = score.toLocaleString();  
            document.getElementById('energy').innerText = energy;  
            level = Math.floor(score / 2000) + 1;  
            document.getElementById('level-display').innerText = "LVL " + level;  
              
            let prog = ((score % 2000) / 2000) * 100;  
            document.getElementById('progress-bar').style.width = prog + "%";  
        }  
  
        function save() {  
            db.collection('users').doc(userId).set({ score, level, energy }, { merge: true });  
        }  
  
        function share() {  
            const link = `https://t.me/Aziz_afarbot?start=${userId}`;  
            tg.openTelegramLink(`https://t.me/share/url?url=${link}&text=Join my team!`);  
        }  
  
        db.collection('users').doc(userId).get().then(doc => {  
            if(doc.exists) { score = doc.data().score || 1000; updateUI(); }  
            else { score = 1000; save(); updateUI(); }  
            document.getElementById('username-display').innerText = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.first_name : "Player";  
        });  
  
        setInterval(() => { if(energy < 1000) { energy += 1; updateUI(); } }, 2000);  
    </script>  
</body>  
</html>
